<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas | Harry Bour</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            height: 100vh;
            display: flex;

            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);

            height: 100%;
            border: none;
        }

</head>
<body>
    <div class="header-stats">
        <h2>Contador de Visitantes</h2>
        <a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Voltar para o site</a>
    </div>

    <div class="iframe-container">
        <iframe src="https://harrybour.goatcounter.com/"></iframe>
    </div>
</body>
</html>
