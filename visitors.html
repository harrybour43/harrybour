<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Visitantes</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Estilos básicos para o seu dashboard */
        .dashboard-container { padding: 40px; color: var(--text-main); }
        .stats-card { background: var(--bg-base); padding: 20px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .link-list { list-style: none; padding: 0; }
        .link-list li { padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Estatísticas do Site</h1>
        
        <div class="stats-card">
            <h2>Total de Visitantes: <span id="total-visitas">Carregando...</span></h2>
        </div>

        <div class="stats-card">
            <h2>Cliques por Link</h2>
            <ul class="link-list" id="lista-cliques">
                <li>Carregando dados...</li>
            </ul>
        </div>
    </div>

    <script>
        // Busca os dados do seu servidor assim que a página carregar
        fetch('/api/estatisticas')
            .then(response => response.json())
            .then(dados => {
                // Atualiza o total de visitas
                document.getElementById('total-visitas').innerText = dados.totalVisitas;

                // Monta a lista de cliques
                const lista = document.getElementById('lista-cliques');
                lista.innerHTML = ''; // Limpa o "Carregando"
                
                dados.cliques.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${item.link}</span> <strong>${item.quantidade} cliques</strong>`;
                    lista.appendChild(li);
                });
            })
            .catch(err => {
                document.getElementById('lista-cliques').innerHTML = "<li>Erro ao carregar dados.</li>";
            });
    </script>
</body>
</html>
