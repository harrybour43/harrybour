<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tratamento | Harry Bour</title>
    <meta
      name="description"
      content="Tratamento de fotos para fotógrafos, do ajuste básico de luz e cor até edições avançadas High-End."
    />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body data-page="tratamento">
    <div class="app-wrapper no-sidebar">
      <header class="fixed-header">
  <a href="index.html" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <a href="index.html" class="brand-name">Harry Bour</a>

  <div class="header-spacer"></div>
</header>

      <main class="main-content full-width">
        <section class="gallery-page active">
          <div class="gallery-container">
            <div
              class="section-header"
              style="
                border-bottom: none;
                text-align: center;
                margin-bottom: 40px;
              "
            >
              <h2>Tratamento</h2>
              <p class="category-description">
                Tratamento de fotos para fotógrafos, do ajuste básico de luz e
                cor até edições avançadas High-End.
              </p>
            </div>

<div id="dynamic-gallery" class="masonry-grid" data-folder="assets/img/tratamento"></div>
<div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  
  <div class="slider-container" onclick="event.stopPropagation()">
    <img id="slider-img-depois" class="img-depois" src="" alt="">
    
    <img id="slider-img-antes" class="img-antes" src="" alt="">
    
    <input type="range" min="0" max="100" value="50" id="slider" class="slider-input">
    
    <div class="slider-line" id="slider-line">
      <div class="slider-button"><i class="fa-solid fa-arrows-left-right"></i></div>
    </div>
  </div>

  <div id="lightbox-caption"></div>
</div>

    <script src="app.js"></script>
  </body>
</html>
