        /* Centralização absoluta do QR Code abaixo do header */

            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            /* Ocupa a tela inteira menos a altura do seu header fixo (70px) */
            height: calc(100vh - var(--header-height)); 
            margin-top: var(--header-height);
            box-sizing: border-box;
        }

        .qr-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-code-svg {
            display: block;
            shape-rendering: crispEdges;
        }

        /* LOGICA DE PROPORÇÃO:
           70% da LARGURA em telas verticais (Portrait)
           70% da ALTURA em telas horizontais (Landscape) */

        @media (orientation: portrait) {
            .qr-code-svg {
                width: 70vw;
                height: 70vw;
            }
        }

        @media (orientation: landscape) {
            .qr-code-svg {
                height: 70vh;
                width: 70vh;
            }
        }
    </style>
