<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foRa dE eScaLa | Conectar</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Fundo Preto Absoluto e bloqueio de rolagem */
        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000000 !important;
        }

        /* Ajuste do cabeçalho para o modo totalmente escuro */
        .fixed-header {
            background-color: #000000 !important;
            border-bottom: 1px solid #222222 !important;
        }
        
        /* Força os textos e ícones do header para branco */
        .brand-name, .btn-back {
            color: #ffffff !important;
        }

        /* Centralização absoluta do QR Code abaixo do header */
        .main-qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100vh - var(--header-height)); 
            margin-top: var(--header-height);
            box-sizing: border-box;
            background-color: #000000;
        }

        .qr-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Otimiza a renderização da imagem para que os quadrados fiquem perfeitos */
        .qr-code-img {
            display: block;
            image-rendering: pixelated; 
        }

        /* LOGICA DE PROPORÇÃO RESPONSIVA */
        
        /* Telas Verticais (Retrato) - 70% da LARGURA */
        @media (orientation: portrait) {
            .qr-code-img {
                width: 70vw;
                height: 70vw;
            }
        }

        /* Telas Horizontais (Paisagem) - 70% da ALTURA */
        @media (orientation: landscape) {
            .qr-code-img {
                height: 70vh;
                width: 70vh;
            }
        }
    </style>
</head>
<body data-page="mapa"> 
    <div class="app-wrapper no-sidebar">
        
        <header class="fixed-header">
            <a href="index.html" class="btn-back" data-tooltip="Voltar ao Portfólio">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <h2 class="brand-name" style="text-transform: none; letter-spacing: 1px">
                foRa dE eScaLa
            </h2>

            <div class="header-spacer"></div>
        </header>

        <main class="main-qr-container">
            <div class="qr-wrapper">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://harrybour.com.br/fora-de-escala.html&color=ffffff&bgcolor=000000&format=svg" alt="QR Code foRa dE eScaLa" class="qr-code-img" />
            </div>
        </main>
    </div>

</body>
</html>
