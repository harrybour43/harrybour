<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harry Bour | Em Manutenção</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body data-page="manutencao">
    <div class="app-wrapper no-sidebar">
      
      <header class="fixed-header">
        <div class="header-spacer"></div>
        <span class="brand-name">Harry Bour</span>
        <div class="header-spacer"></div>
      </header>

      <main 
        class="main-content full-width" 
        style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; margin-top: -35px;"
      >
        <i class="fa-solid fa-camera-retro" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 25px; opacity: 0.5;"></i>
        
        <h2 style="font-family: var(--font-display); font-size: 2.2rem; font-weight: 400; margin-bottom: 15px; color: var(--text-main);">
          Site em Manutenção
        </h2>
        
        <p style="font-family: var(--font-ui); color: var(--text-muted); font-size: 1.1rem; max-width: 500px; line-height: 1.6;">
          Meu portfólio está passando por atualizações estruturais no momento. Em breve, estarei de volta com novos projetos visuais e um acervo renovado.
        </p>
      </main>

    </div>
  </body>
</html>
