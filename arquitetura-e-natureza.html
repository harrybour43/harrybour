<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arquitetura e Natureza | Harry Bour</title>
    <meta name="description" content="Geometria e Permanência das formas." />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
  </head>

  <body data-page="arquitetura-e-natureza">
    <div class="app-wrapper no-sidebar">
      <header class="fixed-header">
        <a href="index.html" class="btn-back">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <a href="index.html" class="brand-name">Harry Bour</a>
        <div class="header-spacer"></div>
      </header>

      <main class="main-content full-width">
        <section class="gallery-page active">
          <div class="gallery-container">
            <div
              class="section-header"
              style="border-bottom: none; text-align: center; margin-bottom: 40px"
            >
              <h2>Arquitetura e Natureza</h2>
              <p class="category-description">
                Investigação visual sobre geometria e permanência das formas.
              </p>
            </div>

            <div class="masonry-grid">
              <div class="book-thumbnail" onclick="openFlipbook('arch11')">
  <img
    src="assets/img/arquitetura/page1-capa.jpg" 
    alt="Capa do photobook ARCH11"
    class="masonry-item"
    style="cursor: pointer;"
  />
  <div class="book-thumbnail-title">ARCH11 - CCSP & Memorial</div>
</div>
              
              </div>
          </div>
        </section>
      </main>
    </div>

    <div id="flipbook-modal" class="flipbook-overlay">
      <span class="lightbox-close" onclick="closeFlipbook()">&times;</span>
      <div class="flipbook-container">
        <div id="book">
          </div>
      </div>
      <div class="flipbook-controls">
        <button onclick="bookInstance.flipPrev()"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="page-counter">1 / 1</span>
        <button onclick="bookInstance.flipNext()"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // ==========================================
      // LÓGICA DO FLIPBOOK (Específica desta página)
      // ==========================================
      let bookInstance = null;

    // Banco de dados dos seus photobooks
      const flipbooksData = {
        'arch11': [
          { type: 'vertical', src: 'assets/img/arquitetura/page1-capa.jpg' },   // Capa (Direita)
          { type: 'vertical', src: 'assets/img/arquitetura/page2.jpg' },        // (Esquerda)
          { type: 'vertical', src: 'assets/img/arquitetura/page3.jpg' },        // (Direita)
          { type: 'spread',   src: 'assets/img/arquitetura/page4-spread.jpg' }, // Dupla
          { type: 'spread',   src: 'assets/img/arquitetura/page5-spread.jpg' }, // Dupla
          { type: 'spread',   src: 'assets/img/arquitetura/page6-spread.jpg' }, // Dupla
          { type: 'vertical', src: 'assets/img/arquitetura/page7.jpg' },        // (Esquerda)
          { type: 'vertical', src: 'assets/img/arquitetura/page8.jpg' },        // (Direita)
          { type: 'vertical', src: 'assets/img/arquitetura/page9.jpg' },        // (Esquerda)
          { type: 'vertical', src: 'assets/img/arquitetura/page10.jpg' },       // (Direita)
          { type: 'vertical', src: 'assets/img/arquitetura/page11.jpg' },       // (Esquerda)
          { type: 'vertical', src: 'assets/img/arquitetura/page12.jpg' },       // (Direita)
          { type: 'vertical', src: 'assets/img/arquitetura/page13.jpg' },       // (Esquerda)
          { type: 'vertical', src: 'assets/img/arquitetura/page14.jpg' },       // (Direita)
          { type: 'spread',   src: 'assets/img/arquitetura/page15-spread.jpg' },// Dupla
          { type: 'spread',   src: 'assets/img/arquitetura/page16-spread.jpg' },// Dupla
          { type: 'spread',   src: 'assets/img/arquitetura/page17-spread.jpg' },// Dupla
          { type: 'vertical', src: 'assets/img/arquitetura/page18.jpg' }        // Contracapa Rígida (Esquerda)
        ]
      };

       function openFlipbook(bookId) {
        const modal = document.getElementById('flipbook-modal');
        const bookContainer = document.getElementById('book');
        const pagesData = flipbooksData[bookId];

        if (!pagesData) return;

        // 1. Limpa o container e monta as páginas HTML
        bookContainer.innerHTML = '';
        let htmlContent = '';
        let pageCounter = 0; // Rastreador de paridade física das páginas

        pagesData.forEach(page => {
          if (page.type === 'vertical') {
            // Define o lado com base na regra de imposição de páginas
            let sideClass = (pageCounter === 0) ? 'page-right' : (pageCounter % 2 === 1 ? 'page-left' : 'page-right');
            
            htmlContent += `
              <div class="page ${sideClass}">
                <div class="page-content" style="background-image: url('${page.src}'); background-size: cover; background-position: center;"></div>
              </div>`;
            pageCounter++;
          } else if (page.type === 'spread') {
            // Um spread horizontal sempre gera uma folha esquerda e uma direita
            htmlContent += `
              <div class="page page-left">
                <div class="page-content spread-left" style="background-image: url('${page.src}');"></div>
              </div>
              <div class="page page-right">
                <div class="page-content spread-right" style="background-image: url('${page.src}');"></div>
              </div>`;
            pageCounter += 2;
          }
        });

        bookContainer.innerHTML = htmlContent;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // 2. Inicializa a animação 3D do Flipbook
        bookInstance = new St.PageFlip(bookContainer, {
          width: 450, 
          height: 600, 
          size: "stretch",
          minWidth: 300,
          maxWidth: 600,
          minHeight: 400,
          maxHeight: 800,
          showCover: true, 
          mobileScrollSupport: false,
          maxShadowOpacity: 0.5,
        });

        bookInstance.loadFromHTML(document.querySelectorAll('.page'));

        // Atualiza contador de páginas
        bookInstance.on('flip', (e) => {
          document.getElementById('page-counter').innerText = `${e.data + 1} / ${bookInstance.getPageCount()}`;
        });
      }

      function closeFlipbook() {
        const modal = document.getElementById('flipbook-modal');
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
        
        if (bookInstance) {
          bookInstance.destroy();
          bookInstance = null;
        }
      }

      // Controles de Teclado do Flipbook (ESC e Setas)
document.addEventListener("keydown", function (event) {
  const modal = document.getElementById('flipbook-modal');
  
  // Confirma se o modal está visível na tela antes de aceitar os comandos
  if (modal && modal.style.display === 'flex') {
    
    if (event.key === "Escape") {
      closeFlipbook();
    } 
    else if (event.key === "ArrowRight") {
      // Seta para a direita: Avança a página
      if (bookInstance) bookInstance.flipNext();
    } 
    else if (event.key === "ArrowLeft") {
      // Seta para a esquerda: Volta a página
      if (bookInstance) bookInstance.flipPrev();
    }
    
  }
});
    </script>
  </body>
</html>
