<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Espaço do Cliente | Harry Bour</title>
    <meta
      name="description"
      content="Área restrita para clientes de Harry Bour. Acesse seus ensaios, coberturas e projetos finalizados com segurança."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="gallery-page">
    <header class="minimal-header">
      <a href="index.html">Harry Bour</a>
    </header>

    <div id="client-auth-modal" class="modal-overlay">
      <div class="modal-content">
        <h3
          id="client-folder-name"
          style="font-family: var(--font-display); margin-bottom: 5px"
        >
          Nome da Pasta
        </h3>
        <p
          style="
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
          "
        >
          Insira os dados fornecidos para visualizar seu ensaio.
        </p>
        <p
          id="client-auth-error"
          style="color: #d16b6b; font-size: 0.85rem; margin-bottom: 10px"
        ></p>

        <input
          type="text"
          id="client-user"
          class="form-input"
          placeholder="Usuário ou E-mail"
          autocomplete="off"
        />
        <input
          type="password"
          id="client-password"
          class="form-input"
          placeholder="Senha de Acesso"
        />

        <button
          class="btn-primary"
          id="btn-submit-auth"
          onclick="submitClientAuth()"
        >
          Acessar Acervo
        </button>
        <button class="btn-secondary" onclick="closeModal('client-auth-modal')">
          Cancelar
        </button>
      </div>
    </div>

    <main class="gallery-container">
      <section id="view-folders" class="view-section active" style="padding: 0">
        <div
          class="section-header"
          style="border-bottom: none; text-align: center; margin-bottom: 40px"
        >
          <h2>Espaço do Cliente</h2>
          <p class="category-description">
            Busque seu ensaio e utilize a senha fornecida para acessar o
            material finalizado no Google Drive.
          </p>
        </div>

        <div class="search-container" style="margin: 0 auto">
          <input
            type="text"
            id="folder-search"
            placeholder="Buscar pelo nome do ensaio..."
            oninput="filterFolders()"
          />
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>

        <div
          id="folders-loader"
          style="
            display: none;
            color: var(--text-muted);
            margin-top: 20px;
            text-align: center;
          "
        >
          Sincronizando com o acervo...
        </div>

        <div
          id="folder-list"
          class="folder-list"
          style="margin: 20px auto; align-items: center"
        ></div>
      </section>

      <section
        id="view-gallery-content"
        class="view-section"
        style="display: none; height: 100vh; padding: 0 0 20px 0"
      >
        <div
          class="section-header"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
          "
        >
          <div>
            <h2 id="gallery-title" style="font-size: 1.8rem; margin: 0">
              Carregando...
            </h2>
          </div>
          <a
            href="#"
            id="drive-link-btn"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-secondary"
            style="
              width: auto;
              padding: 8px 15px;
              margin: 0;
              font-size: 0.9rem;
              text-decoration: none;
            "
          >
            <i class="fa-brands fa-google-drive"></i> Abrir no Drive
          </a>
        </div>

        <div id="view-carousel" class="client-carousel-area">
          <div
            id="photo-loader"
            style="color: var(--text-muted); position: absolute"
          >
            Buscando imagens seguras...
          </div>
          <div class="click-area-left" onclick="moveCarousel(-1)"></div>
          <div class="client-carousel-track" id="track"></div>
          <div class="click-area-right" onclick="moveCarousel(1)"></div>
        </div>

        <div
          id="view-grid"
          class="client-gallery-grid"
          style="display: none"
        ></div>

        <div style="text-align: center; margin-top: 15px">
          <button
            class="btn-secondary"
            id="btn-toggle-view"
            onclick="toggleClientView()"
            style="
              width: auto;
              padding: 10px 30px;
              display: none;
              margin: 0 auto;
            "
          >
            <i class="fa-solid fa-border-all"></i>
            <span id="text-toggle-view">Ver Mosaico</span>
          </button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script
      async
      defer
      src="https://apis.google.com/js/api.js"
      onload="gapiLoaded()"
    ></script>

    <script>
      // CHAVES E LINKS DE CONEXÃO
      const API_KEY = "AIzaSyBSqkKDWvXjswvsOzEeSWuXFq85G3xBELc";
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxBdB5NePT0mvhfpo1FitujbW57K1ufD_gV2tWIvhx573f9sI4QtnTQb6K7e_zpOXbi/exec";

      let imagesData = [];
      let currentIndex = 0;
      let isGalleryView = false;
      let targetFolderId = "";
      let allFolders = [];

      window.onload = () => fetchFolders();

      async function fetchFolders() {
        const loader = document.getElementById("folders-loader");
        const list = document.getElementById("folder-list");
        list.innerHTML = "";
        loader.style.display = "block";

        try {
          let response = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getFolders" }),
            headers: { "Content-Type": "text/plain;charset=utf-8" },
          });
          let result = await response.json();
          loader.style.display = "none";

          if (result.success && result.folders.length > 0) {
            allFolders = result.folders.sort((a, b) =>
              b.name.localeCompare(a.name)
            );
            renderFolders(allFolders);
          } else {
            loader.innerText = "Nenhuma pasta encontrada no momento.";
            loader.style.display = "block";
          }
        } catch (err) {
          loader.innerText = "Erro de conexão ao buscar o acervo.";
          loader.style.display = "block";
        }
      }

      function renderFolders(foldersToRender) {
        const list = document.getElementById("folder-list");
        list.innerHTML = "";
        if (foldersToRender.length === 0) {
          list.innerHTML = `<div style="color: var(--text-muted); padding: 15px;">Nenhum ensaio corresponde à busca.</div>`;
          return;
        }
        foldersToRender.forEach((folder) => {
          const card = document.createElement("div");
          card.className = "folder-card";
          card.style.width = "100%";
          card.innerHTML = `<i class="fa-solid fa-folder-closed"></i> <span style="font-weight: 500;">${folder.name}</span>`;
          card.onclick = () => openAuthModal(folder.id, folder.name);
          list.appendChild(card);
        });
      }

      function filterFolders() {
        const searchTerm = document
          .getElementById("folder-search")
          .value.toLowerCase();
        const filtered = allFolders.filter((f) =>
          f.name.toLowerCase().includes(searchTerm)
        );
        renderFolders(filtered);
      }

      function openAuthModal(id, name) {
        targetFolderId = id;
        document.getElementById("client-folder-name").innerText = name;
        document.getElementById("gallery-title").innerText = name;
        document.getElementById("client-user").value = "";
        document.getElementById("client-password").value = "";
        document.getElementById("client-auth-error").innerText = "";
        document.getElementById("client-auth-modal").style.display = "flex";
      }

      async function submitClientAuth() {
        const user = document.getElementById("client-user").value;
        const pass = document.getElementById("client-password").value;
        const errorDiv = document.getElementById("client-auth-error");
        const btn = document.getElementById("btn-submit-auth");

        if (!user || !pass) {
          errorDiv.innerText = "Por favor, preencha usuário e senha.";
          return;
        }

        btn.innerText = "Autenticando...";
        btn.disabled = true;

        try {
          let response = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "auth",
              user: user,
              pass: pass,
              folderId: targetFolderId,
            }),
            headers: { "Content-Type": "text/plain;charset=utf-8" },
          });
          let result = await response.json();
          if (result.success) {
            closeModal("client-auth-modal");
            document.getElementById("view-folders").style.display = "none";
            document.getElementById("view-gallery-content").style.display =
              "flex";
            listPhotos();
          } else {
            errorDiv.innerText =
              result.error || "Credenciais inválidas. Tente novamente.";
          }
        } catch (err) {
          errorDiv.innerText = "Falha de conexão com o servidor de segurança.";
        }
        btn.innerText = "Acessar Acervo";
        btn.disabled = false;
      }

      function gapiLoaded() {
        gapi.load("client", () => {
          gapi.client
            .init({
              apiKey: API_KEY,
              discoveryDocs: [
                "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest",
              ],
            })
            .then(() => console.log("Google Drive API conectada."));
        });
      }

      async function listPhotos() {
        document.getElementById("photo-loader").style.display = "block";
        document.getElementById("btn-toggle-view").style.display = "none";
        document.getElementById("track").innerHTML = "";

        try {
          let folderResponse = await gapi.client.drive.files.list({
            q: `'${targetFolderId}' in parents and mimeType = 'application/vnd.google-apps.folder' and name = 'DIGITAL' and trashed = false`,
            fields: "files(id, name)",
          });
          let folders = folderResponse.result.files;
          let digitalFolderId =
            folders && folders.length > 0 ? folders[0].id : targetFolderId;

          document.getElementById(
            "drive-link-btn"
          ).href = `https://drive.google.com/drive/folders/${targetFolderId}`;

          let response = await gapi.client.drive.files.list({
            q: `'${digitalFolderId}' in parents and mimeType contains 'image/' and trashed = false`,
            fields: "files(id, name, thumbnailLink)",
            pageSize: 100,
          });

          let files = response.result.files;
          if (files && files.length > 0) {
            imagesData = files.map((file) =>
              file.thumbnailLink.replace(/\=s\d+$/, "=s1200")
            );
            document.getElementById("photo-loader").style.display = "none";
            document.getElementById("btn-toggle-view").style.display =
              "inline-flex";

            currentIndex = 0;
            isGalleryView = false;
            renderCarousel();
            renderGridGallery();
            setupSwipe();
          } else {
            document.getElementById("photo-loader").innerText =
              "O ensaio está sendo processado. Nenhuma imagem finalizada ainda.";
          }
        } catch (err) {
          document.getElementById("photo-loader").innerText =
            "Não foi possível carregar as imagens de alta resolução.";
        }
      }

      function renderCarousel() {
        const track = document.getElementById("track");
        track.innerHTML = "";
        if (imagesData.length === 0) return;

        imagesData.forEach((src, index) => {
          const img = document.createElement("img");
          img.src = src;
          if (index === currentIndex) img.className = "client-slide active";
          else if (index === getPrevIndex())
            img.className = "client-slide prev";
          else if (index === getNextIndex())
            img.className = "client-slide next";
          else {
            img.className = "client-slide";
            img.style.display = "none";
          }
          track.appendChild(img);
        });
      }

      function getPrevIndex() {
        return currentIndex === 0 ? imagesData.length - 1 : currentIndex - 1;
      }
      function getNextIndex() {
        return currentIndex === imagesData.length - 1 ? 0 : currentIndex + 1;
      }

      function moveCarousel(direction) {
        if (imagesData.length === 0) return;
        if (direction === 1) currentIndex = getNextIndex();
        else currentIndex = getPrevIndex();
        renderCarousel();
      }

      function toggleClientView() {
        const viewCarousel = document.getElementById("view-carousel");
        const viewGrid = document.getElementById("view-grid");
        const btnText = document.getElementById("text-toggle-view");
        const btnIcon = document.querySelector("#btn-toggle-view i");
        isGalleryView = !isGalleryView;

        if (isGalleryView) {
          viewCarousel.style.display = "none";
          viewGrid.style.display = "grid";
          btnText.innerText = "Ver Destaque";
          btnIcon.className = "fa-solid fa-expand";
        } else {
          viewGrid.style.display = "none";
          viewCarousel.style.display = "flex";
          btnText.innerText = "Ver Mosaico";
          btnIcon.className = "fa-solid fa-border-all";
        }
      }

      function renderGridGallery() {
        const gallery = document.getElementById("view-grid");
        gallery.innerHTML = "";
        imagesData.forEach((src, index) => {
          const img = document.createElement("img");
          img.src = src;
          img.className = "gallery-item";
          img.onclick = () => {
            currentIndex = index;
            toggleClientView();
            renderCarousel();
          };
          gallery.appendChild(img);
        });
      }

      let touchstartX = 0;
      let touchendX = 0;
      function setupSwipe() {
        const carouselArea = document.getElementById("view-carousel");
        carouselArea.addEventListener(
          "touchstart",
          (e) => {
            touchstartX = e.changedTouches[0].screenX;
          },
          { passive: true }
        );
        carouselArea.addEventListener(
          "touchend",
          (e) => {
            touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 40) moveCarousel(1);
            if (touchendX > touchstartX + 40) moveCarousel(-1);
          },
          { passive: true }
        );
      }
    </script>
  </body>
</html>
