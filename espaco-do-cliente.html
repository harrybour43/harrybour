<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Espaço do Cliente | Harry Bour</title>
    <meta name="description" content="Área restrita para clientes de Harry Bour. Acesse seus ensaios e projetos com segurança." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body data-page="espaco-do-cliente">
    <div class="app-wrapper no-sidebar">
        
        <header class="fixed-header">
            <a href="index.html">Harry Bour</a>
        </header>

        <main class="main-content full-width">
            <section class="gallery-page active">
                <div class="gallery-container">
                    
                    <div class="section-header" style="text-align: center; border-bottom: none; margin-bottom: 40px;">
                        <h2>Espaço do Cliente</h2>
                        <p class="category-description">
                            Área segura e restrita para acesso aos seus ensaios fotográficos.
                        </p>
                    </div>

                    <div id="client-login-section" style="text-align: center; margin: 40px auto; max-width: 400px;">
                        <p style="color: var(--text-muted); margin-bottom: 25px;">
                            Insira seu e-mail cadastrado para localizar seu material exclusivo.
                        </p>
                        
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <input 
                                type="email" 
                                id="user-email" 
                                placeholder="seu@email.com" 
                                style="padding: 14px; background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border-color); font-family: var(--font-ui); width: 100%; box-sizing: border-box; text-align: center;" 
                            />
                            
                            <button class="btn-primary" onclick="acessarPasta()" id="btn-login">
                                Acessar Meu Ensaio
                            </button>
                            
                            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 10px; line-height: 1.4;">
                                * Você será redirecionado para o ambiente seguro do Google Drive.
                            </p>
                        </div>
                    
                        <p id="login-error-msg" style="color: #d16b6b; font-size: 0.9rem; display: none; margin-top: 15px;">
                            E-mail não autorizado ou não encontrado.
                        </p>
                    </div>

                    <div id="drive-container" style="display: none; width: 100%; margin-top: 40px; border-radius: 4px; overflow: hidden;">
                    </div>

                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
