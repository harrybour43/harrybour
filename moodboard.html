<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodboard Dinâmico | Harry Bour</title>
  <meta name="description" content="Ferramenta personalizada para montagem de pranchas PDF." />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .moodboard-tool {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .controls-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      border: 1px solid var(--border-color);
      padding: 20px;
      background: var(--bg-surface);
    }
    .control-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .control-item label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    .control-item select {
      background: #000;
      color: #fff;
      border: 1px solid #444;
      padding: 8px;
      font-family: var(--font-ui);
      cursor: pointer;
    }
    .moodboard-tool input[type="file"] {
      display: none;
    }
    .btn-action {
      background-color: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 15px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .btn-action:hover:not(:disabled) {
      background-color: #222;
      border-color: #555;
    }
    .btn-action:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    #fileCount {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }
    #status {
      font-size: 0.75rem;
      font-family: monospace;
      color: var(--text-muted);
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>

<body data-page="moodboard">
  <div class="app-wrapper no-sidebar">
    <header class="fixed-header">
      <a href="index.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <a href="index.html" class="brand-name">Harry Bour</a>
      <div class="header-spacer"></div>
    </header>

    <main class="main-content full-width">
      <section class="gallery-page active">
        <div class="gallery-container">
          
          <div class="section-header" style="border-bottom: none; text-align: center; margin-bottom: 40px">
            <h2>Moodboard</h2>
            <p class="category-description">Configuração personalizada de pranchas técnicas e visuais.</p>
          </div>

          <div class="moodboard-tool">
            <div class="controls-group">
              <div class="control-item">
                <label>Imagens por página</label>
                <select id="imgsPerPage">
                  <option value="1">1 Imagem</option>
                  <option value="2" selected>2 Imagens</option>
                  <option value="4">4 Imagens</option>
                  <option value="6">6 Imagens</option>
                  <option value="8">8 Imagens</option>
                  <option value="10">10 Imagens</option>
                </select>
              </div>
              <div class="control-item">
                <label>Orientação PDF</label>
                <select id="pdfOrientation">
                  <option value="p">Retrato (Vertical)</option>
                  <option value="l">Paisagem (Horizontal)</option>
                </select>
              </div>
            </div>

            <label class="btn-action">
              <input type="file" id="fileInput" accept="image/*" multiple />
              <i class="fa-solid fa-images"></i> Selecionar Arquivos
            </label>
            
            <div id="fileCount">Nenhum arquivo selecionado</div>
            
            <button id="generateBtn" class="btn-action" disabled>
              <i class="fa-solid fa-file-pdf"></i> Gerar PDF Customizado
            </button>
            
            <div id="status"></div>
          </div>

        </div>
      </section>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const fileCountDiv = document.getElementById('fileCount');
    const selectImgs = document.getElementById('imgsPerPage');
    const selectOrient = document.getElementById('pdfOrientation');

    fileInput.addEventListener('change', (e) => {
      const count = e.target.files.length;
      fileCountDiv.innerText = count > 0 ? `${count} arquivo(s) selecionado(s)` : 'Nenhum arquivo selecionado';
      generateBtn.disabled = count === 0;
    });

    const { jsPDF } = window.jspdf;

    generateBtn.addEventListener('click', async () => {
      const files = Array.from(fileInput.files);
      const perPage = parseInt(selectImgs.value);
      const orientation = selectOrient.value;

      generateBtn.disabled = true;
      statusDiv.innerText = "> INICIANDO PROCESSAMENTO...";

      try {
        const processedImages = [];
        for (let i = 0; i < files.length; i++) {
          statusDiv.innerText = `> OTIMIZANDO ${i + 1}/${files.length}...`;
          processedImages.push(await processImage(files[i]));
        }

        const pdf = new jsPDF({ orientation: orientation, unit: 'mm', format: 'a4', compress: true });
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();
        const margin = pw * 0.05; // Margem de 5% para grids maiores
        const gap = 5; // Espaço entre fotos

        // Lógica de Grid Masonry Simplificada
        let cols = perPage <= 1 ? 1 : perPage <= 4 ? 2 : perPage <= 9 ? 3 : 4;
        if (orientation === 'l' && perPage > 2) cols = Math.ceil(perPage / 2);
        const rows = Math.ceil(perPage / cols);

        const availableW = (pw - (2 * margin) - ((cols - 1) * gap)) / cols;
        const availableH = (ph - (2 * margin) - ((rows - 1) * gap)) / rows;

        for (let i = 0; i < processedImages.length; i += perPage) {
          if (i > 0) pdf.addPage(orientation, 'mm', 'a4');
          
          const chunk = processedImages.slice(i, i + perPage);
          chunk.forEach((img, idx) => {
            const col = idx % cols;
            const row = Math.floor(idx / cols);

            const ratio = Math.min(availableW / img.w, availableH / img.h);
            const w = img.w * ratio;
            const h = img.h * ratio;

            const x = margin + (col * (availableW + gap)) + (availableW - w) / 2;
            const y = margin + (row * (availableH + gap)) + (availableH - h) / 2;

            pdf.addImage(img.src, 'JPEG', x, y, w, h);
          });
        }

        const ts = new Date().toISOString().replace(/[-:T]/g, '').slice(2, 14);
        pdf.save(`moodboard_${ts}.pdf`);
        statusDiv.innerText = "> PDF GERADO COM SUCESSO.";

      } catch (e) {
        statusDiv.innerText = "> ERRO NO PROCESSAMENTO.";
      } finally {
        generateBtn.disabled = false;
        setTimeout(() => statusDiv.innerText = "", 5000);
      }
    });

    async function processImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1200; // Reduzido ligeiramente para garantir os 12MB em grids de 10
            let w = img.width, h = img.height;
            if (Math.max(w, h) > MAX) {
              const s = MAX / Math.max(w, h);
              w *= s; h *= s;
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve({ src: canvas.toDataURL('image/jpeg', 0.7), w: w, h: h });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
