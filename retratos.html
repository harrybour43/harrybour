<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retratos | Harry Bour</title>
    <meta name="description" content="Cotidiano e Resistência em São Paulo." />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body data-page="retratos">
    <div class="app-wrapper no-sidebar">
      <header class="fixed-header">
  <a href="index.html" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <a href="index.html" class="brand-name">Harry Bour</a>

  <div class="header-spacer"></div>
</header>

      <main class="main-content full-width">
        <section class="gallery-page active">
          <div class="gallery-container">
            <div
              class="section-header"
              style="
                border-bottom: none;
                text-align: center;
                margin-bottom: 40px;
              "
            >
              <h2>Retratos</h2>
              <p class="category-description">
                A essência traduzida em imagens.
              </p>
            </div>

            <div class="masonry-grid">
              <img
                src="assets/img/retratos/jornada-heroi-001.jpg"
                alt="Jornada do Herói"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />

              <img
                src="assets/img/retratos/jornada-heroi-002.jpg"
                alt="Jornada do Herói"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />

              <img
                src="assets/img/retratos/jornada-heroi-003.jpg"
                alt="Jornada do Herói"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/jornada-heroi-004.jpg"
                alt="Jornada do Herói"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-andrebarion-001.jpg"
                alt="Estúdio Formosa - André Barion"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-andrebarion-002.jpg"
                alt="Estúdio Formosa - André Barion"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-ladyletal-001.jpg"
                alt="Estúdio Formosa - Luccas Morais"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-ladyletal-002.jpg"
                alt="Estúdio Formosa - Luccas Morais"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-silvamarall-001.jpg"
                alt="Estúdio Formosa - Silva Amaral"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
              <img
                src="assets/img/retratos/retrato-ambientado-atelie-formosa-silvamarall-002.jpg"
                alt="Estúdio Formosa - Silva Amaral"
                class="masonry-item"
                onclick="openLightbox(this.src, this.alt)"
              />
                            
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
      <span class="lightbox-close">&times;</span>
      <img id="lightbox-img" src="" alt="" />
      <div id="lightbox-caption"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
