<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoria de Imagem V2 | Harry Bour</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
      .calc-wrapper {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .calc-panel {
        flex: 1;
        min-width: 350px;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        padding: 30px;
        border-radius: 4px;
      }

      .full-width { flex-basis: 100%; }

      .drop-zone {
        border: 2px dashed var(--border-color);
        padding: 30px;
        text-align: center;
        cursor: pointer;
        background: var(--bg-base);
        color: var(--text-muted);
        margin-bottom: 20px;
      }

      .drop-zone.dragover { border-color: var(--text-main); background: var(--btn-bg); }

      .result-box {
        margin-top: 20px;
        padding: 20px;
        border-left: 4px solid var(--border-color);
        background: var(--bg-base);
        display: none;
      }

      /* Estilização da Tabela Dinâmica */
      .table-container {
        margin-top: 20px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-ui);
        font-size: 0.9rem;
      }

      th {
        text-align: left;
        background: var(--bg-base);
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 12px;
        border-bottom: 2px solid var(--border-color);
      }

      td {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
      }

      .badge {
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .badge-good { background: #155724; color: #d4edda; }
      .badge-warn { background: #856404; color: #fff3cd; }
      .badge-crit { background: #721c24; color: #f8d7da; }

      .status-good { border-left-color: #4ade80; }
      .status-warning { border-left-color: #facc15; }
      .status-bad { border-left-color: #f87171; }
    </style>
  </head>

  <body data-page="calculadora-v2">
    <div class="app-wrapper no-sidebar">
      <header class="fixed-header">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="index.html" class="brand-name">Harry Bour</a>
        <div class="header-spacer"></div>
      </header>

      <main class="main-content">
        <section class="view-section active" style="display:block;">
          <div class="section-header" style="text-align: center; margin-bottom: 40px">
            <h2>Auditoria de Resolução V2</h2>
            <p class="category-description">Análise técnica de densidade (PPI) e saída física (DPI).</p>
          </div>

          <div class="calc-wrapper">
            <div class="calc-panel">
              <div class="drop-zone" id="drop-zone">
                <i class="fa-solid fa-upload"></i>
                <p>Arraste a imagem ou clique</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
              </div>
              <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                  <label>Largura (px)</label>
                  <input type="number" id="input-w">
                </div>
                <div class="form-group" style="flex:1">
                  <label>Altura (px)</label>
                  <input type="number" id="input-h">
                </div>
              </div>
              <button class="btn-submit" id="btn-calcular" style="width: 100%; margin-top: 20px;">Gerar Laudo Completo</button>
            </div>

            <div class="calc-panel">
              <h3 style="font-family: var(--font-display); margin-bottom: 15px;">Diagnóstico Geral</h3>
              <div id="resultado-box" class="result-box">
                <div id="res-titulo" style="font-weight: 600; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div id="res-texto" style="font-size: 0.95rem; color: var(--text-muted);"></div>
              </div>
            </div>

            <div class="calc-panel full-width">
              <h3 style="font-family: var(--font-display); margin-bottom: 20px;">Matriz de Capacidade e Suportes (2026)</h3>
              <div class="table-container">
                <table id="tabela-capacidade">
                  <thead>
                    <tr>
                      <th>Destino / Uso</th>
                      <th>Padrão Sugerido</th>
                      <th>Dimensão Máxima</th>
                      <th>Qualidade</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr><td colspan="4" style="text-align:center; color:var(--text-muted)">Aguardando dados da imagem...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const fileInput = document.getElementById('file-input');
      const dropZone = document.getElementById('drop-zone');
      const btnCalcular = document.getElementById('btn-calcular');

      // Drag and Drop
      dropZone.onclick = () => fileInput.click();
      dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
      dropZone.ondragleave = () => dropZone.classList.remove('dragover');
      dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) processar(e.dataTransfer.files[0]);
      };
      fileInput.onchange = (e) => processar(e.target.files[0]);

      function processar(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            document.getElementById('input-w').value = img.width;
            document.getElementById('input-h').value = img.height;
            gerarRelatorio(img.width, img.height);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      btnCalcular.onclick = () => {
        const w = parseInt(document.getElementById('input-w').value);
        const h = parseInt(document.getElementById('input-h').value);
        if (w && h) gerarRelatorio(w, h);
      };

      function gerarRelatorio(w, h) {
        const resBox = document.getElementById('resultado-box');
        resBox.style.display = 'block';
        
        // Regras de PPI vs DPI
        // PPI (Pixels Per Inch) é para telas. 72-96 é o padrão "legado" para web sem retina.
        // 150-300 PPI é o padrão para telas modernas de alta densidade.
        
        const megapixels = ((w * h) / 1000000).toFixed(1);
        document.getElementById('res-titulo').innerText = `${megapixels} Megapixels detectados`;
        document.getElementById('res-texto').innerText = `O arquivo possui resolução suficiente para cobrir uma ampla gama de suportes, desde ícones de sistema até ampliações físicas.`;

        const formatos = [
          { nome: "Ícone (PWA/Android)", ref: 192, ppi: 96, tipo: "Digital" },
          { nome: "WhatsApp (Compressão padrão)", ref: 1600, ppi: 96, tipo: "Rede Social" },
          { nome: "Instagram Feed (1:1)", ref: 1080, ppi: 150, tipo: "Rede Social" },
          { nome: "Instagram Stories/Reels", ref: 1080, ppi: 300, tipo: "Rede Social" },
          { nome: "Web Standard (Full HD)", ref: 1920, ppi: 72, tipo: "Web" },
          { nome: "Monitor Retina / 4K", ref: 3840, ppi: 240, tipo: "Web" },
          { nome: "Impressão Fine Art (Máxima)", dpi: 300, tipo: "Papel" },
          { nome: "Impressão Jornal/Outdoor", dpi: 72, tipo: "Papel" }
        ];

        const tbody = document.querySelector('#tabela-capacidade tbody');
        tbody.innerHTML = '';

        formatos.forEach(f => {
          let dim = "";
          let qual = "";
          let badge = "";

          if (f.dpi) {
            // Cálculo para papel (DPI)
            const cmW = ((w / f.dpi) * 2.54).toFixed(1);
            const cmH = ((h / f.dpi) * 2.54).toFixed(1);
            dim = `${cmW} x ${cmH} cm`;
            qual = `${f.dpi} DPI`;
            badge = f.dpi >= 300 ? "badge-good" : (f.dpi >= 150 ? "badge-warn" : "badge-crit");
          } else {
            // Cálculo para telas (PPI)
            const ratio = (w / f.ref).toFixed(2);
            dim = `${f.ref}px base`;
            qual = `${f.ppi} PPI`;
            
            if (ratio >= 1) {
              badge = "badge-good";
            } else if (ratio >= 0.7) {
              badge = "badge-warn";
            } else {
              badge = "badge-crit";
            }
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${f.nome}</strong><br><small>${f.tipo}</small></td>
            <td>${qual}</td>
            <td>${dim}</td>
            <td><span class="badge ${badge}">${badge === 'badge-good' ? 'Excelente' : (badge === 'badge-warn' ? 'Aceitável' : 'Crítico')}</span></td>
          `;
          tbody.appendChild(tr);
        });
      }
    </script>
  </body>
</html>
